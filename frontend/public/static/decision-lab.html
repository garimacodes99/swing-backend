<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Trade Gatekeeper · Swing Intelligence</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* Local, game-specific polish */
    .gatekeeper {
      max-width: 720px;
      margin: 40px auto;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
    }

    .metric {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px dashed var(--border);
      font-size: 0.9rem;
    }

    .metric:last-child {
      border-bottom: none;
    }

    .metric span:last-child {
      font-weight: 600;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .btn-allow {
      flex: 1;
      border: 1px solid #22c55e;
      color: #22c55e;
      background: transparent;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-forbid {
      flex: 1;
      border: 1px solid #ef4444;
      color: #ef4444;
      background: transparent;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
    }

    .result {
      margin-top: 18px;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .result.allow {
      border: 1px solid #22c55e;
      color: #22c55e;
    }

    .result.forbid {
      border: 1px solid #ef4444;
      color: #ef4444;
    }
  </style>
</head>

<body>

<nav class="top-nav">
  <div class="nav-left">Swing Intelligence</div>
  <div class="nav-center">
    <a href="/static/home.html">Home</a>
    <a href="/static/decision-lab.html" class="active">Decision Lab</a>
  </div>
</nav>

<div class="gatekeeper">
  <h2>Trade Gatekeeper</h2>
  <p class="sub">Decide like the system. Not like your emotions.</p>

  <div id="metrics"></div>

  <div class="actions">
    <button class="btn-allow" onclick="decide(true)">ALLOW</button>
    <button class="btn-forbid" onclick="decide(false)">FORBID</button>
  </div>

  <div id="result"></div>
</div>

<script>
const scenarios = [
  {
    priceVsSMA: "Below SMA 200",
    atr: "8.4%",
    breadth: "Weak",
    rsi: "22 (Oversold)",
    verdict: false,
    reason: "Forbidden: Price below SMA 200 and volatility too high."
  },
  {
    priceVsSMA: "Above SMA 200",
    atr: "2.1%",
    breadth: "Strong",
    rsi: "48 (Neutral)",
    verdict: true,
    reason: "Allowed: Trend aligned, volatility controlled, breadth supportive."
  },
  {
    priceVsSMA: "Above SMA 200",
    atr: "6.9%",
    breadth: "Mixed",
    rsi: "71 (Overbought)",
    verdict: false,
    reason: "Forbidden: Overbought conditions with elevated volatility."
  }
];

let current = {};

function loadScenario() {
  current = scenarios[Math.floor(Math.random() * scenarios.length)];
  document.getElementById("result").innerHTML = "";

  document.getElementById("metrics").innerHTML = `
    <div class="metric"><span>Price vs SMA 200</span><span>${current.priceVsSMA}</span></div>
    <div class="metric"><span>ATR (Volatility)</span><span>${current.atr}</span></div>
    <div class="metric"><span>Market Breadth</span><span>${current.breadth}</span></div>
    <div class="metric"><span>RSI</span><span>${current.rsi}</span></div>
  `;
}

function decide(choice) {
  const correct = choice === current.verdict;
  const box = document.getElementById("result");

  box.className = "result " + (current.verdict ? "allow" : "forbid");
  box.innerText = correct
    ? "✔ Correct. " + current.reason
    : "✖ Incorrect. " + current.reason;

  setTimeout(loadScenario, 2200);
}

loadScenario();
</script>

</body>
</html>
